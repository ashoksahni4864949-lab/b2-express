    <!-- Countdown Timer Script -->
    <script>
        // 5 minute ka timer script
        let timeInSecs = 5 * 60; // 5 minutes
        const timerElement = document.getElementById('timer');

        function updateTimer() {
            let minutes = Math.floor(timeInSecs / 60);
            let seconds = timeInSecs % 60;

            // Zero padding if less than 10
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            timerElement.textContent = `${minutes}:${seconds}`;

            if (timeInSecs > 0) {
                timeInSecs--;
            } else {
                // Agar timer khatam ho jaye toh phir se 5 min pe reset kardo (FOMO create karne ke liye)
                timeInSecs = 5 * 60;
            }
        }

        // Har ek second me timer update karein
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
