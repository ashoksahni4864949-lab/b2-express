<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Exclusive Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Premium Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        /* Telegram Button Gradient */
        .telegram-btn {
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
            box-shadow: 0 10px 20px -10px rgba(34, 158, 217, 0.5);
            transition: all 0.3s ease;
        }
        
        .telegram-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(34, 158, 217, 0.7);
        }

        /* Smooth Background Animation */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center relative overflow-hidden font-sans">
    
    <!-- Animated Background Blobs -->
    <div class="absolute top-0 -left-4 w-96 h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30 animate-blob"></div>
    <div class="absolute top-0 -right-4 w-96 h-96 bg-cyan-500 rounded-full mix-blend-screen filter blur-[100px] opacity-30 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-8 left-20 w-96 h-96 bg-blue-800 rounded-full mix-blend-screen filter blur-[100px] opacity-30 animate-blob animation-delay-4000"></div>

    <!-- Main Content Container -->
    <div class="glass-card relative z-10 w-full max-w-md mx-4 p-10 rounded-[2.5rem] text-center">
        
        <!-- Telegram Logo Vector -->
        <div class="flex justify-center mb-8">
            <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(255,255,255,0.1)] relative group">
                <div class="absolute inset-0 rounded-full bg-blue-400 opacity-0 group-hover:opacity-20 transition-opacity duration-300"></div>
                <svg class="w-14 h-14 text-[#2AABEE] ml-[-2px] mt-[2px] transform group-hover:scale-110 transition-transform duration-300" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.45c.538-.196 1.006.128.832.941z"/>
                </svg>
            </div>
        </div>

        <!-- Headline & Copy -->
        <h1 class="text-3xl font-extrabold mb-3 tracking-tight">Join B2 EXPRESS</h1>
        <p class="text-gray-400 mb-8 text-base leading-relaxed">
            Get daily updates, exclusive insights, and real-time alerts directly on your device.
        </p>
        
        <!-- Secure CTA Button (Anti-Fake Click) -->
        <button id="joinBtn" onclick="handleSecureClick(event)" class="telegram-btn w-full inline-flex items-center justify-center py-4 px-8 rounded-full text-white font-bold text-lg focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-opacity-50 transition-all duration-300">
            <span id="btnText" class="transition-all duration-300">Join Now For Free</span>
            <svg id="btnIcon" class="w-5 h-5 ml-2 transition-all duration-300 transform group-hover:translate-x-1" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
            </svg>
        </button>
        
        <!-- Social Proof / Urgency -->
        <div class="mt-6 flex items-center justify-center space-x-2">
            <span class="flex h-3 w-3 relative">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <p class="text-sm text-gray-400 font-medium">Over 5,000+ members active</p>
        </div>
        
    </div>

    <script>
        // HUMAN BEHAVIOR TRACKING: Bots mouse move ya screen touch nahi karte.
        let isHuman = false;
        let pageLoadTime = Date.now();

        const markAsHuman = () => { isHuman = true; };
        // Detect real user interactions (Mouse, Touch, Scroll, Keyboard)
        window.addEventListener('mousemove', markAsHuman, { once: true });
        window.addEventListener('touchstart', markAsHuman, { once: true });
        window.addEventListener('scroll', markAsHuman, { once: true });
        window.addEventListener('keydown', markAsHuman, { once: true });

        // SAFELY USE LOCALSTORAGE: Incognito/Private mode me crash hone se bachane ke liye
        function getStorageItem(key) {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        }
        function setStorageItem(key, value) {
            try { localStorage.setItem(key, value); } catch(e) { console.warn("Storage disabled"); }
        }

        // PAGE LOAD HOTE HI CHECK KAREGA
        document.addEventListener("DOMContentLoaded", () => {
            const hasJoinedBefore = getStorageItem('b2express_clicked');
            if (hasJoinedBefore) {
                document.getElementById('btnText').innerText = "Open Telegram Channel";
            }
        });

        // BACK BUTTON FIX (BFCache): Agar user Telegram se back aaye toh button atka na rahe
        window.addEventListener("pageshow", (event) => {
            if (event.persisted) { // Check if page is loaded from browser cache (back button)
                const btn = document.getElementById('joinBtn');
                const btnText = document.getElementById('btnText');
                const btnIcon = document.getElementById('btnIcon');
                
                // Button Reset
                btn.disabled = false;
                btn.removeAttribute('data-processing');
                btn.classList.remove('opacity-75', 'cursor-not-allowed', 'scale-95');
                btn.classList.add('hover:-translate-y-px', 'hover:shadow-lg');
                btnText.classList.remove('animate-pulse');
                btnIcon.classList.remove('hidden');
                
                // Sahi text set karein
                btnText.innerText = getStorageItem('b2express_clicked') ? "Open Telegram Channel" : "Join Now For Free";

                // Reset timer on back button taaki bots cache ka fayda na utha sakein
                pageLoadTime = Date.now();
            }
        });

        function handleSecureClick(event) {
            // SECURITY CHECK 1: isTrusted (Browser confirm karega ki physical click tha)
            if (!event.isTrusted) {
                console.warn("Blocked: Non-trusted automated click.");
                return false;
            }

            // SECURITY CHECK 2: Time-on-page (Bots page load hote hi fast click karte hain)
            const timeElapsed = Date.now() - pageLoadTime;
            if (timeElapsed < 1500) { // Agar 1.5 seconds se pehle click kiya toh pakka bot hai
                console.warn("Blocked: Clicked too fast. Likely a bot.");
                return false;
            }

            // SECURITY CHECK 3: Human Interaction (Kya user ne mouse move ya phone screen touch kiya?)
            if (!isHuman) {
                console.warn("Blocked: No human interaction detected before clicking.");
                return false;
            }

            const btn = document.getElementById('joinBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');

            // SECURITY CHECK 4: Double Click / Spam Click Prevention
            if (btn.disabled || btn.getAttribute('data-processing') === 'true') return false;

            btn.setAttribute('data-processing', 'true');
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed', 'scale-95');
            btn.classList.remove('hover:-translate-y-px', 'hover:shadow-lg');
            
            btnText.innerText = "Redirecting securely...";
            btnText.classList.add('animate-pulse');
            btnIcon.classList.add('hidden');

            const telegramLink = "https://t.me/+3G5SXDVar_llZjY1";
            
            const hasJoinedBefore = getStorageItem('b2express_clicked');
            
            if (!hasJoinedBefore) {
                console.log("New User Clicked! Tracking Conversion...");
                setStorageItem('b2express_clicked', 'true');
            } else {
                console.log("Returning User. Not counting as a new conversion.");
            }

            setTimeout(() => {
                window.location.href = telegramLink;
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.removeAttribute('data-processing');
                    btn.classList.remove('opacity-75', 'cursor-not-allowed', 'scale-95');
                    btn.classList.add('hover:-translate-y-px', 'hover:shadow-lg');
                    btnText.innerText = "Open Telegram Channel";
                    btnText.classList.remove('animate-pulse');
                    btnIcon.classList.remove('hidden');
                }, 3000); 
            }, 800); 
        }
    </script>
</body>
</html>
